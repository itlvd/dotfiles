#################################
#          Backend              #
#################################
# glx is required for blur to work.
backend = "glx";
vsync = true;

#################################
#           Blur               #
#################################
blur-method = "dual_kawase";
blur-strength = 5;
blur-background = true;
blur-background-frame = true;
blur-background-fixed = true;

# Do not blur the wallpaper itself / desktop.
# Polybar is intentionally NOT excluded so the glass bar shows a blurred wallpaper.
blur-background-exclude = [
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c"
];

#################################
#         Transparency         #
#################################
# Only make Alacritty transparent so we can see the blurred wallpaper behind it.
# Other apps keep their own opacity.
opacity-rule = [
  "85:class_g = 'Alacritty'"
];

#################################
#       Rounded corners        #
#################################
corner-radius = 8;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Polybar'"
];

#################################
#           Fading             #
#################################
fading = true;
fade-in-step = 0.04;
fade-out-step = 0.04;
fade-delta = 5;

#################################
#          Settings            #
#################################
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
use-damage = true;
