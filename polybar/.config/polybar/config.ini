; ============================================================================
;  Polybar — Catppuccin Mocha, minimal
;  Launched once per monitor by launch.sh (MONITOR + POLY_TRAY env vars).
;
;  Minimal style: dark bar, no colored backgrounds. Each module shows a muted
;  text label (CPU/RAM/DISK/...) + the value in normal text. Only accents:
;  blue for the focused workspace, red for urgent.
; ============================================================================

include-file = ~/.config/polybar/colors.ini

; ----------------------------------------------------------------------------
;  Bar
; ----------------------------------------------------------------------------
[bar/main]
monitor = ${env:MONITOR:}
monitor-strict = false

width = 100%
height = 30
radius = 0
bottom = false
fixed-center = true

background = ${colors.base}
foreground = ${colors.text}

line-size = 0
border-size = 0
padding = 2
module-margin = 0
separator = %{F#45475a}  ·  %{F-}

font-0 = JetBrainsMono Nerd Font:size=10;3
font-1 = JetBrainsMono Nerd Font:size=12;3

modules-left = i3
modules-center = xwindow
modules-right = pulseaudio mic network filesystem memory cpu date powermenu

; Tray only on the primary monitor (POLY_TRAY=right there, none elsewhere, set by launch.sh).
; Bar-level tray keys are deprecated in polybar 3.7 but remain functional and are the only
; reliable way to pin the tray to one monitor.
tray-position = ${env:POLY_TRAY:none}
tray-background = ${colors.base}
tray-padding = 6
tray-maxsize = 18

enable-ipc = true
cursor-click = pointer

; ----------------------------------------------------------------------------
;  Modules
; ----------------------------------------------------------------------------

[module/i3]
type = internal/i3
pin-workspaces = true
strip-wsnumbers = false
index-sort = true
enable-click = true
enable-scroll = true
wrapping-scroll = false

label-focused = %name%
label-focused-foreground = ${colors.blue}
label-focused-padding = 1

label-visible = %name%
label-visible-foreground = ${colors.subtext0}
label-visible-padding = 1

label-unfocused = %name%
label-unfocused-foreground = ${colors.overlay0}
label-unfocused-padding = 1

label-urgent = %name%
label-urgent-foreground = ${colors.red}
label-urgent-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title%
label-maxlen = 55
label-foreground = ${colors.overlay1}
label-empty =

[module/cpu]
type = internal/cpu
interval = 2
format = <label>
format-prefix = "CPU "
format-prefix-foreground = ${colors.overlay1}
label = "%percentage%%"
label-foreground = ${colors.text}

[module/memory]
type = internal/memory
interval = 2
format = <label>
format-prefix = "RAM "
format-prefix-foreground = ${colors.overlay1}
label = "%gb_used%"
label-foreground = ${colors.text}

[module/filesystem]
type = internal/fs
mount-0 = /
interval = 30
format-mounted = <label-mounted>
format-mounted-prefix = "DISK "
format-mounted-prefix-foreground = ${colors.overlay1}
label-mounted = "%percentage_used%%"
label-mounted-foreground = ${colors.text}
format-unmounted =

[module/network]
type = internal/network
interface-type = wired
interval = 3
format-connected = <label-connected>
format-connected-prefix = "NET "
format-connected-prefix-foreground = ${colors.overlay1}
label-connected = "%local_ip%"
label-connected-foreground = ${colors.text}

format-disconnected = <label-disconnected>
format-disconnected-prefix = "NET "
format-disconnected-prefix-foreground = ${colors.overlay1}
label-disconnected = "off"
label-disconnected-foreground = ${colors.overlay1}

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = false
interval = 2
format-volume = <label-volume>
format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.overlay1}
label-volume = "%percentage%%"
label-volume-foreground = ${colors.text}

format-muted = <label-muted>
format-muted-prefix = "VOL "
format-muted-prefix-foreground = ${colors.overlay1}
label-muted = "mute"
label-muted-foreground = ${colors.overlay1}

click-right = pavucontrol &

[module/mic]
type = custom/script
exec = ~/.config/polybar/scripts/mic.sh
interval = 2
format = <label>
format-prefix = "MIC "
format-prefix-foreground = ${colors.overlay1}
label = "%output%"
label-foreground = ${colors.text}
click-left = pactl set-source-mute @DEFAULT_SOURCE@ toggle

[module/date]
type = internal/date
interval = 5
date = %a %d %b
time = %H:%M
format = <label>
label = "%date%  %time%"
label-foreground = ${colors.text}

[module/powermenu]
type = custom/text
label = "  "
label-foreground = ${colors.overlay1}
click-left = ~/.local/bin/powermenu

; ----------------------------------------------------------------------------
[settings]
screenchange-reload = true
pseudo-transparency = false
