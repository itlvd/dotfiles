# Kitty configuration — Catppuccin Mocha
# Migrated from Alacritty. Transparency works together with picom (glx +
# dual_kawase blur) so the blurred wallpaper shows through the terminal.
# Kitty talks to fcitx5 via a proper IME path (not XIM), which avoids the
# duplicate Enter/Backspace bug Alacritty had with Vietnamese input engines.

#################################
#            Font               #
#################################
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size 11.0

#################################
#       Window / layout         #
#################################
# Use xterm-256color instead of xterm-kitty so programs that lack the kitty
# terminfo entry don't print raw escape sequences (e.g. Delete key broken).
term xterm-256color
# Disable XIM so fcitx5 does not double-send Enter/Backspace through kitty
enable_ime no
background_opacity 0.85
window_padding_width 10
confirm_os_window_close 0
enable_audio_bell no

#################################
#   Catppuccin Mocha palette    #
#################################
foreground              #cdd6f4
background              #1e1e2e
selection_foreground    #1e1e2e
selection_background    #f5e0dc

cursor                  #f5e0dc
cursor_text_color       #1e1e2e

url_color               #f5e0dc

active_border_color     #b4befe
inactive_border_color   #6c7086
bell_border_color       #f9e2af

active_tab_foreground   #11111b
active_tab_background   #cba6f7
inactive_tab_foreground #cdd6f4
inactive_tab_background #181825
