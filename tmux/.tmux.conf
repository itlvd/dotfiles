# Catppuccin Mocha tmux theme
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set -g focus-events on

set -g mouse on
set -g history-limit 50000
setw -g mode-keys vi

unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g @ctp_rosewater "#f5e0dc"
set -g @ctp_flamingo "#f2cdcd"
set -g @ctp_pink "#f5c2e7"
set -g @ctp_mauve "#cba6f7"
set -g @ctp_red "#f38ba8"
set -g @ctp_maroon "#eba0ac"
set -g @ctp_peach "#fab387"
set -g @ctp_yellow "#f9e2af"
set -g @ctp_green "#a6e3a1"
set -g @ctp_teal "#94e2d5"
set -g @ctp_sky "#89dceb"
set -g @ctp_sapphire "#74c7ec"
set -g @ctp_blue "#89b4fa"
set -g @ctp_lavender "#b4befe"
set -g @ctp_text "#cdd6f4"
set -g @ctp_subtext1 "#bac2de"
set -g @ctp_subtext0 "#a6adc8"
set -g @ctp_overlay2 "#9399b2"
set -g @ctp_overlay1 "#7f849c"
set -g @ctp_overlay0 "#6c7086"
set -g @ctp_surface2 "#585b70"
set -g @ctp_surface1 "#45475a"
set -g @ctp_surface0 "#313244"
set -g @ctp_base "#1e1e2e"
set -g @ctp_mantle "#181825"
set -g @ctp_crust "#11111b"

set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g window-style "bg=#1e1e2e,fg=#cdd6f4"
set -g window-active-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 60
set -g status-right-length 120
set -g status-left "#[bg=#89b4fa,fg=#11111b,bold] #S #[bg=#1e1e2e,fg=#89b4fa] "
set -g status-right "#[bg=#1e1e2e,fg=#a6e3a1,bold]#{?client_prefix, PREFIX ,}#[fg=#89b4fa,bold] %H:%M #[fg=#cdd6f4] %d %b "

setw -g window-status-separator ""
setw -g window-status-format "#[bg=#1e1e2e,fg=#bac2de] #I:#W "
setw -g window-status-current-format "#[bg=#cba6f7,fg=#11111b,bold] #I:#W "
setw -g window-status-activity-style "bg=#1e1e2e,fg=#f9e2af,bold"
setw -g window-status-bell-style "bg=#f38ba8,fg=#11111b,bold"

set -g pane-border-style "fg=#585b70"
set -g pane-active-border-style "fg=#89b4fa"
set -g display-panes-colour "#bac2de"
set -g display-panes-active-colour "#89b4fa"

set -g message-style "bg=#313244,fg=#cdd6f4"
set -g message-command-style "bg=#313244,fg=#cdd6f4"
set -g mode-style "bg=#89b4fa,fg=#11111b,bold"

bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"
